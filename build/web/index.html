<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SLIS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="slis-header" id="home">
      <div class="header-inner">
        <a class="logo-wrap" href="#home" aria-label="SLIS Home">
          <img src="assets/slis-logo.png" alt="SLIS logo" class="slis-logo" />
        </a>

        <div class="center-zone">
          <form class="search-shell" role="search" aria-label="Site search">
            <button class="icon-chip left" type="button" aria-label="Search">
              <span class="icon">🔍</span>
            </button>
            <input
              type="text"
              placeholder="What do you want to learn today?"
              aria-label="What do you want to learn today?"
            />
            <button class="icon-chip right" type="button" aria-label="Voice search">
              <span class="icon">🎤</span>
            </button>
          </form>

          <nav class="header-nav" aria-label="Primary">
            <a href="#">For Learners</a>
            <a href="#">For Educators</a>
            <a href="#">For Parents</a>
            <a href="#">For Institute</a>
          </nav>
        </div>

        <div class="header-actions" aria-label="Account actions">
          <a href="#" class="action-btn become-member" aria-label="Become a Member">
            <img src="assets/btn-become-member.png" alt="Become a Member" />
          </a>
          <a href="#" class="action-btn members-login" aria-label="Members Login">
            <img src="assets/btn-members-login.png" alt="Members Login" />
          </a>
        </div>
      </div>
    </header>

    <main>
      <section class="blank-content" aria-hidden="true"></section>
    </main>
  </body>
</html>
